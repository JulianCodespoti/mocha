    /* ── Base ─────────────────────────────────────────── */
    body {

      line-height: 1.7;
      overflow-x: hidden;

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #d4a574;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #c88b8b;
    }
    html {
      scrollbar-width: thin;
      scrollbar-color: #d4a574 #0a0a0a;
    }

    /* ── Hero ─────────────────────────────────────────── */
    .hero-bg {
      background-image: url('IMG_9060.JPG');
      background-size: cover;
      background-position: center;
      will-change: transform;
    }

    .hero-overlay {
      background: linear-gradient(
        180deg,
        rgba(10, 10, 10, 0.55) 0%,
        rgba(10, 10, 10, 0.70) 50%,
        rgba(10, 10, 10, 0.95) 100%
      );
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ── Title Animation ──────────────────────────────── */
    .hero-title {
      letter-spacing: 0.35em;
      opacity: 0;
    }

    .hero-subtitle {
      opacity: 0;
    }

    /* ── Chevron bounce ────────────────────────────────── */
    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0); opacity: 0.7; }
      50%      { transform: translateY(10px); opacity: 1; }
    }
    .scroll-indicator {
      animation: gentleBounce 2.4s ease-in-out infinite;
    }

    /* ── Masonry Grid ─────────────────────────────────── */
    .masonry {
      column-count: 4;
      column-gap: 1rem;
    }
    @media (max-width: 1280px) {
      .masonry { column-count: 3; }
    }
    @media (max-width: 768px) {
      .masonry { column-count: 2; }
    }
    @media (max-width: 480px) {
      .masonry { column-count: 1; }
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      opacity: 0;
      transform: translateY(40px);
    }

    /* ── Gallery Image Styles ─────────────────────────── */
    .gallery-link {
      display: block;
      position: relative;
      border-radius: 0.5rem;
      overflow: hidden;
      cursor: pointer;
    }

    .gallery-img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 0.5rem;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.35s ease,
                  box-shadow 0.35s ease;
    }

    .gallery-link:hover .gallery-img {
      transform: scale(1.05);
      filter: brightness(1.1);
      box-shadow: 0 8px 32px rgba(212, 165, 116, 0.25),
                  0 0 0 1px rgba(212, 165, 116, 0.10);
    }

    /* ── Header ───────────────────────────────────────── */

      transition: background-color 0.4s ease, backdrop-filter 0.4s ease;
    }
    .site-header.scrolled {
      background-color: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <!-- GLightbox -->
  <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>

  <script>
    /* ── GLightbox Init ──────────────────────────────── */
    const lightbox = GLightbox({
      touchNavigation: true,
      loop: true,
      skin: 'clean',
      openEffect: 'fade',
      closeEffect: 'fade',
    });

    /* ── Register GSAP Plugins ───────────────────────── */
    gsap.registerPlugin(ScrollTrigger);

    /* ── Hero Animations ─────────────────────────────── */
    const heroTl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    heroTl
      .to('.hero-title', {
        opacity: 1,
        letterSpacing: '0.35em',
        duration: 1.4,
        delay: 0.3,
      })
      .from('.hero-title', {
        letterSpacing: '0.8em',
        duration: 1.4,
      }, '<')
      .to('.hero-subtitle', {
        opacity: 1,
        y: 0,
        duration: 0.9,
        stagger: 0.2,
      }, '-=0.6')
      .from('.hero-subtitle', {
        y: 20,
        duration: 0.9,
        stagger: 0.2,
      }, '<')
      .from('.gold-line', {
        scaleX: 0,
        duration: 0.8,
      }, '-=1');

    /* ── Hero Parallax ───────────────────────────────── */
    gsap.to('#heroBg', {
      yPercent: 25,
      ease: 'none',
      scrollTrigger: {
        trigger: '#hero',
        start: 'top top',
        end: 'bottom top',
        scrub: 0.5,
      },
    });

    /* ── Gallery Scroll Animations ────────────────────── */
    const masonryItems = gsap.utils.toArray('.masonry-item');

    masonryItems.forEach((item, i) => {
      gsap.to(item, {
        opacity: 1,
        y: 0,
        duration: 0.7,
        ease: 'power2.out',
        scrollTrigger: {
          trigger: item,
          start: 'top 92%',
          end: 'top 60%',
          toggleActions: 'play none none none',
        },
        delay: (i % 4) * 0.08,
      });
    });

    /* ── Sticky Header ───────────────────────────────── */
    const header = document.querySelector('.site-header');

    ScrollTrigger.create({
      start: 80,
      onUpdate: (self) => {
        if (self.scroll() > 80) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
      },
    });

    /* ── Section Header Fade-in ──────────────────────── */
    gsap.from('#gallery .text-center', {
      opacity: 0,
      y: 30,
      duration: 1,
      ease: 'power2.out',
      scrollTrigger: {
        trigger: '#gallery',
        start: 'top 80%',
        toggleActions: 'play none none none',
      },
    });
  </script>

</body>
</html>
