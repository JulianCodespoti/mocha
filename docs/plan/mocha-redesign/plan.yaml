    estimated_effort: medium
    estimated_files: 1
    estimated_lines: 0
    focus_area: Security, accessibility, performance, code quality
    verification:
      - Review report generated with findings categorized by severity
      - All critical and high findings addressed or documented
      - No security vulnerabilities identified
    acceptance_criteria:
      - Zero critical security findings
      - WCAG 2.1 AA contrast requirements met
      - All images have unique descriptive alt texts
      - Focus management works correctly with preloader
      - No render-blocking issues in critical path
      - HTML validates without structural errors
    requires_review: true
    review_depth: full
    security_sensitive: true

