      /home/domjules/Coding/mocha/thumbs/: Generated thumbnails from W4-image-gen
      /home/domjules/Coding/mocha/webp/: Generated WebP files from W4-image-gen
    estimated_effort: large
    estimated_files: 1
    estimated_lines: 400
    focus_area: Responsive images, picture elements, layout shift prevention
    verification:
      - All 39 images use <picture> elements with WebP and JPEG sources
      - Placeholder backgrounds visible before images load (throttle network in DevTools)
      - No layout shift when images load (check CLS in Lighthouse)
      - GLightbox still opens full-size original JPGs
      - Images fade in smoothly when loaded
      - Page works in browsers without WebP support (falls back to JPEG thumbnails)
    acceptance_criteria:
      - Every image wrapped in <picture> with webp and jpeg sources
      - Thumbnail (800px) used as default src, original used for lightbox href
      - Warm placeholder background visible during image loading
      - aspect-ratio set on image containers to reserve space
      - Images fade in on load (opacity transition)
      - GLightbox still functions correctly with full-size images
    failure_modes:
      - scenario: GLightbox breaks with <picture> element nesting inside <a> tag
        likelihood: medium
        impact: high
        mitigation: Test GLightbox compatibility with <picture>. If broken, keep <img> with srcset attribute instead of <picture> element.
    tech_stack:
