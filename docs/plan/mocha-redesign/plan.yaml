  - id: W4-responsive-images
    title: Wire Responsive Images with Placeholders
    description: |
      Update index.html to use responsive image markup and add visual placeholders
      to prevent layout shift during loading.

      Changes to implement:
      1. Responsive Images (#2): Replace each <img> tag with a <picture> element containing:
         - <source srcset="webp/{name}.webp" type="image/webp">
         - <source srcset="thumbs/{name}.JPG" type="image/jpeg">
         - <img src="thumbs/{name}.JPG" ...> as fallback
         Update the GLightbox <a href> to still point to original full-size JPGs for the lightbox view.
      2. Image Placeholders (#5): Add a dominant-color background placeholder to each
         image container using a warm brown/amber CSS background color (e.g., #3d2e1f)
         with aspect-ratio reservation. Use style="aspect-ratio: 3/4; background: #3d2e1f"
         on image containers (since we can't extract actual dominant colors without a
         build tool, use a consistent warm placeholder that matches the mocha aesthetic).
         Add transition on image opacity to fade in when loaded.
      3. Image load fade-in: Add an onload handler or CSS technique to fade images in
         when they finish loading. Set initial opacity: 0 on images, then transition
         to opacity: 1 on load.
    wave: 4
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
