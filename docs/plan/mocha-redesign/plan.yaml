  # WAVE 5 — Final Review
  # ═══════════════════════════════════════════════════════
  - id: W5-review
    title: Final Security and Quality Review
    description: |
      Comprehensive review of the completed redesign covering code quality, security,
      accessibility, and performance.

      Review scope:
      1. Security: Verify no external resources loaded over HTTP (all HTTPS). Check that
         inline SVGs don't contain script elements. Verify no user-input-dependent code
         (XSS vectors). Check Content Security Policy compatibility.
      2. Accessibility: Run through WCAG 2.1 AA checklist — contrast ratios, alt texts,
         focus management, keyboard navigation, screen reader compatibility.
         Verify preloader doesn't trap focus. Check aria-labels on icon-only elements.
      3. Performance: Check for excessive DOM nodes, oversized images in initial load,
         render-blocking resources, unused CSS. Verify lazy loading on below-fold images.
         Check that preloader doesn't delay interactive time unnecessarily.
      4. Code quality: Validate HTML structure (no unclosed tags, proper nesting).
         Check CSS for dead rules. Verify GSAP cleanup (no memory leaks from ScrollTrigger).
         Check mobile responsiveness at all breakpoints.
      5. Cross-browser: Verify fallbacks for backdrop-filter, CSS aspect-ratio,
         scroll-snap, :focus-visible.
    wave: 5
    agent: gem-reviewer
    priority: high
    status: pending
    dependencies:
      - W5-micro-interactions
    context_files:
      /home/domjules/Coding/mocha/index.html: Final redesigned file
