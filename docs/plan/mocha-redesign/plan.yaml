    failure_modes:
      - scenario: ImageMagick not installed or lacks WebP delegate
        likelihood: medium
        impact: high
        mitigation: Check for magick/convert first. If WebP delegate missing, try cwebp as fallback. If no tools available, skip WebP and generate thumbnails only.
