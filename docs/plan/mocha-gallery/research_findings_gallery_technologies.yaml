    pattern: "Uniform aspect ratio photos"
    description: "All 39 photos share identical 3088x2056 dimensions (3:2 landscape). This uniformity is a significant design advantage — it allows consistent grid cells, predictable masonry layouts, and uniform thumbnail sizing without complex responsive calculations."
    examples:
      - file: IMG_9060.JPG
        location: "3088x2056"
        snippet: "identify IMG_9060.JPG → 3088x2056+0+0 8-bit sRGB 1.51MiB"
