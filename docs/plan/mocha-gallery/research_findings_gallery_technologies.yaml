        type: pattern
        location: "IMG_9060.JPG through IMG_9148.JPG"
        description: "Uniform 3088x2056px (3:2 landscape ratio), sRGB, 8-bit JPEG. Sizes range from 1.4MB (IMG_9096.JPG) to 2.7MB (IMG_9090.JPG). Total: 81MB. All dated Jan 23-24, 2023."
    language: N/A
    lines: 0

patterns_found:
