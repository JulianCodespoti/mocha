related_technology_stack:
  languages_used_in_domain:
    - HTML5
    - CSS3 (modern features)
    - Vanilla JavaScript (ES2022+)

  frameworks_used_in_domain:
    - name: "Tailwind CSS v4 (Play CDN)"
      usage_in_domain: |
        Utility-first CSS framework loaded via CDN with zero build step.
        CDN URL: https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4
        Loaded as a <script> tag in <head>.
        Supports custom themes via <style type="text/tailwindcss"> blocks.
        Ideal for: rapid prototyping, responsive design, dark mode, spacing, typography.
        NOT for production at scale (Play CDN is dev-oriented), but perfect for a personal showcase.
        Tailwind v4 uses CSS-first configuration — no tailwind.config.js needed.

    - name: "GSAP 3 (GreenSock Animation Platform)"
      usage_in_domain: |
        Industry-standard animation library for scroll-driven animations.
        CDN: https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js
        ScrollTrigger plugin: https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js
        Key features for this project:
          - ScrollTrigger: link animations to scroll position (scrub, pin, snap)
          - Pinning: lock hero section while animations play
          - Staggered reveals: animate gallery items in sequence
          - Smooth scrubbing: scrub: 1 for 1-second catch-up smoothing
          - Snapping: snap to section boundaries
        Free for personal/non-commercial use. All plugins now freely available on npm.
        Must call gsap.registerPlugin(ScrollTrigger) after loading.

  libraries_used_in_domain:
    - name: "No additional libraries required"
      purpose_in_domain: |
        The combination of Tailwind CSS + GSAP + modern CSS/JS APIs provides everything needed.
        Optional lightweight additions:
          - GLightbox (~10KB): lightweight lightbox with touch gestures
          - Lenis (~15KB): smooth scroll library (alternative: CSS scroll-behavior: smooth)

  external_apis_used_in_domain: []

related_conventions:
  naming_patterns_in_domain: |
    Photo files follow camera naming: IMG_NNNN.JPG
    For production, consider renaming to semantic names: mocha-portrait-01.jpg, mocha-playing-02.jpg
    CSS classes should use Tailwind utility conventions or BEM for custom styles

  structure_of_domain: |
    Single HTML file structure (index.html):
      <head>: meta, Tailwind CDN, custom styles, font links
      <body>:
        <section id="hero">: Full-screen hero with featured photo
        <section id="showcase">: Horizontal scroll filmstrip
        <section id="gallery">: Masonry/grid of all photos
        <div id="lightbox">: Modal overlay for full-screen viewing
        <footer>: Credits
      <script>: GSAP CDN, ScrollTrigger CDN, inline app JS
    
    Optional: Separate CSS file for custom animations (@keyframes)
    Optional: Separate JS file for gallery logic

  error_handling_in_domain: |
    - img onerror handlers for broken image fallbacks
    - CSS aspect-ratio or width/height on img tags to prevent CLS
    - Graceful degradation: if GSAP fails to load, gallery still shows (CSS-only layout)
    - @supports queries for scroll-driven animations

  testing_in_domain: |
    Manual testing across browsers (Chrome, Firefox, Safari)
    Lighthouse performance audits
    Core Web Vitals monitoring (LCP, CLS, FID)

  documentation_in_domain: |
    Inline HTML comments for section boundaries
    CSS custom properties documented at :root level

